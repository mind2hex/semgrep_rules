metadata: &common_metadata
  category: security
  subcategory:
    - vuln
    - audit
  technology:
    - ruby
  vulnerability_class:
    - Server-Side Request Forgery
    - SSRF
  cwe:
    - "CWE-918: Server-Side Request Forgery (SSRF)"
  owasp:
    - "A10:2021 - Server-Side Request Forgery (SSRF)"
  confidence: HIGH
  impact: HIGH
  likelihood: HIGH
  shortDescription: Untrusted input flows into outbound request sinks
  description: >
    This rule detects tainted data flowing from user-controlled sources into
    HTTP client APIs or into interpolated URL strings later used for network
    access. If an attacker can influence the destination host, scheme, port,
    or path, they may coerce the server into issuing requests to arbitrary
    external or internal endpoints.
  remediation: >
    Do not build request destinations directly from untrusted input. Use
    strict allowlists for hosts, schemes, ports, and paths. Resolve and
    validate destinations after parsing, block internal and link-local IP
    ranges, and avoid forwarding user-controlled URLs to generic HTTP
    clients whenever possible.
  references:
    - "https://cwe.mitre.org/data/definitions/918.html"
    - "https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/"
    - "https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html"

pattern-sources: &common_pattern_sources
  - pattern: params
  - pattern: cookies
  - pattern: session
  - pattern: request.headers
  - pattern: request.body
  - patterns:
      - pattern: def $FUNCTION(..., $SOURCE, ...) ... end
      - focus-metavariable: $SOURCE

paths: &common_paths
  exclude:
    - "*spec.rb"

rules:
  - id: ruby-taint-100-ssrf-uri-open
    languages:
      - ruby
    severity: HIGH
    message: >
      Untrusted input reaches an outbound HTTP client or is used to construct a
      URL for a network request. This can enable Server-Side Request Forgery
      (SSRF), allowing attackers to make the application send requests to
      internal services, cloud metadata endpoints, or other unintended hosts.
    mode: taint
    metadata: *common_metadata
    path: *common_paths
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: URI.open(...)
      - pattern: ::URI.open(...)
      - pattern: self.URI.open(...)
      - pattern: send(:open, ...)
      - pattern: __send__(:open, ...)
      - pattern: public_send(:open, ...)
      - pattern: URI.send(:open, ...)
      - pattern: URI.__send__(:open, ...)
      - pattern: URI.public_send(:open, ...)
      - pattern: method(:open).call(...)

  - id: ruby-taint-100-ssrf-net-http
