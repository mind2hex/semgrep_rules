    mode: taint
    metadata: *common_metadata
    path: *common_paths
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      # URL FORMATION
      - patterns:
        - pattern-either:
          - pattern: |
              "http://#{$SINK}..."
          - pattern: |
              "https://#{$SINK}..."
          - pattern: |
              "ftp://#{$SINK}..."
          - pattern: |
              "ssh://#{$SINK}..."
        - focus-metavariable: $SINK