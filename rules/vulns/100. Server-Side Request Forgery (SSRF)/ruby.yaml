      - pattern: ::Net::HTTP.$METHOD(...)
      - pattern: self.Net::HTTP.$METHOD(...)
      - pattern: Net::HTTP.send(:$METHOD, ...)
      - pattern: Net::HTTP.__send__(:$METHOD, ...)
      - pattern: Net::HTTP.public_send(:$METHOD, ...)

