metadata: &common_metadata
  category: security
  subcategory:
    - audit
  cwe:
    - "CWE-798: Use of Hard-coded Credentials"
    - "CWE-259: Use of Hard-coded Password"
    - "CWE-321: Use of Hard-coded Cryptographic Key"
    - "CWE-540: Inclusion of Sensitive Information in Source Code"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: MEDIUM
  references:
    - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
    - https://cwe.mitre.org/data/definitions/798.html
    - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html

rules:
  - id: json-pattern-009-google-cloud-platform-credentials
    languages:
      - json
    severity: INFO
    message: |
      Potential hardcoded google cloud platform credentials secret detected in JSON configuration.
      Move the value to a secret manager or environment variable and rotate exposed credentials.
    pattern-either:
      - pattern: |
          "client_email": "$SECRET"
      - pattern: |
          "client_secret": "$SECRET"
      - pattern: |
          "client_id": "$SECRET"
      - pattern: |
          "private_key": "$SECRET"
      - pattern: |
          "private_key_id": "$SECRET"
      - pattern: |
          "project_id": "$SECRET"
        
    metadata: *common_metadata

  - id: json-pattern-009-aws-credentials
