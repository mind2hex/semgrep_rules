rules:
  - id: php-pattern-009-hardcoded-secret
    languages:
      - php
    severity: HIGH
    message: >
      Hardcoded secret detected. Avoid storing secrets directly in source code.
      Use environment variables or a secure secret manager instead.
    metadata:
      category: security
      subcategory:
        - audit
      vulnerability_class:
        - Hardcoded Secret
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      references:
        - "https://cwe.mitre.org/data/definitions/798.html"
    pattern-either:
      - patterns:
        - pattern: |
            [..., '$KEY' => "$VALUE", ...]
        - metavariable-regex:
            metavariable: $KEY
            regex: (secret|token|password|key)
        - metavariable-regex:
            metavariable: $VALUE
            regex: .+
        - focus-metavariable: $VALUE