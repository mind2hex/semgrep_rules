metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-799: Improper Control of Interaction Frequency"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: MEDIUM
  technology:
    - nodejs
    - expressjs

paths: &common_paths
  exclude:
    - "*test.js"
    - "*test.ts"
    - "*test.jsx"
    - "*test.tsx"
    - "*test.spec.js"
    - "*test.spec.ts"
    - "*test.spec.jsx"
    - "*test.spec.tsx"
    - "*test.unit.js"
    - "*test.unit.ts"
    - "*test.unit.jsx"
    - "*test.unit.tsx"
    - "*test.integration.js"
    - "*test.integration.ts"
    - "*test.integration.jsx"
    - "*test.integration.tsx"
    - "*test.e2e.js"
    - "*test.e2e.ts"
    - "*test.e2e.jsx"
    - "*test.e2e.tsx"
    - "**/*.component.ts"
    - "**/*.spec.ts"

    # Exclude files inside directories containing front/front-end/react (case variations)
    - "**/*front*/**"
    - "**/*Front*/**"
    - "**/*FRONT*/**"
    - "**/*front-end*/**"
    - "**/*Front-End*/**"
    - "**/*FRONT-END*/**"
    - "**/*react*/**"
    - "**/*React*/**"
    - "**/*REACT*/**"

rules:
  - id: javascript-taint-115-security-controls-bypass-or-absence-rate-limit
    languages:
      - javascript
    severity: ERROR
    message: >
      The application has a rate limit mechanism that use request headers as the key.
    mode: taint
    metadata: *common_metadata
    paths: *common_paths
    pattern-sources:
      - pattern: request.headers
      - pattern: request.json
    pattern-sinks:
      - patterns:
          - pattern: |
              await $RT.consume($SINK);
          - focus-metavariable: $SINK