metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-94: Improper Control of Generation of Code ('Code Injection')"
  confidence: MEDIUM
  likelihood: LOW
  impact: HIGH
  owasp:
    - A3:2021 Injection

pattern-sources: &common_pattern_sources
  - pattern: request
  - pattern: self.request
  - pattern: self.get_argument(...)
  - patterns:
      - pattern: |
          def $FOO(..., $X, ...):
            ...
      - focus-metavariable: $X

paths: &common_paths
  exclude:
    - "*test.py"
    - "*test.pyw"
    - "*test.pyz"
    - "*test.pywz"
    - "*test.pyz"

rules:
  - id: python-taint-000-code-injection-eval
    languages: 
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: eval(...)
      - pattern: builtins.eval(...)
      - pattern: __builtins__.eval(...)
      - pattern: __builtins__["eval"](...)
      - pattern: globals()["__builtins__"]["eval"](...)
      - pattern: globals()["eval"](...)
      - pattern: locals()["eval"](...)
      - pattern: getattr(__builtins__, "eval")(...)
      - pattern: getattr(builtins, "eval")(...)
      - pattern: getattr($OBJ, "eval")(...)
      - pattern: getattr(globals()["__builtins__"], "eval")(...)
      - pattern: $OBJ["eval"](...)
      - pattern: simple_eval(...)

  - id: python-taint-000-code-injection-exec
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      # direct sinks
      - pattern-either:
        - pattern: exec(...)
        - pattern: exec(..., globals())
        - pattern: exec(..., globals(), locals())
        - pattern: builtins.exec(...)
        - pattern: __builtins__.exec(...)
        - pattern: __builtins__["exec"](...)
        - pattern: globals()["__builtins__"]["exec"](...)
        - pattern: globals()["exec"](...)
        - pattern: locals()["exec"](...)
        - pattern: getattr(__builtins__, "exec")(...)
        - pattern: getattr(builtins, "exec")(...)
        - pattern: getattr($OBJ, "exec")(...)

  - id: python-taint-000-code-injection-compile
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: compile(...)
      - pattern: builtins.compile(...)
      - pattern: __builtins__.compile(...)
      - pattern: __builtins__["compile"](...)
      - pattern: globals()["__builtins__"]["compile"](...)
      - pattern: globals()["compile"](...)
      - pattern: locals()["compile"](...)
      - pattern: getattr(__builtins__, "compile")(...)
      - pattern: getattr(builtins, "compile")(...)
      - pattern: getattr($OBJ, "compile")(...)
      - pattern: globals()["compile"](...)
      - pattern: globals().compile(...)
      - pattern: $OBJ["compile"](...)
      - pattern: $OBJ.compile(...)
      
  - id: python-taint-000-code-injection-importlib
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata 
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: importlib.import_module(...)
      - pattern: importlib.util.spec_from_file_location(...)
      - pattern: importlib.util.module_from_spec(...)
      - pattern: __import__(...)
      - pattern: simple_import(...)

  - id: python-taint-000-code-injection-pandas-eval
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - patterns: 
          - pattern: |
              $FOO = pandas.DataFrame(...)
              ...
          - pattern: $FOO..eval(...)

  - id: python-taint-000-code-injection-timeit
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - patterns: 
        - pattern: timeit.timeit($SINK, ...)
        - focus-metavariable: $SINK

  - id: python-taint-000-code-injection-aeval
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - patterns:
        - pattern-inside: |
            $AEVAL = Interpreter()
            ...
        - pattern: $AEVAL(...)

  - id: python-taint-000-code-injection-py_mini_racer
    languages:
      - python
    severity: HIGH
    message: >-
      User-controlled input is being used to build or execute program code. This can let an attacker inject arbitrary code or alter application logic. Validate and sanitize inputs and avoid dynamic code evaluation.
    mode: taint
    paths: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - patterns:
        - pattern-inside: |
            $CTX = py_mini_racer.MiniRacer()
            ...
        - pattern: $CTX.eval(...)
