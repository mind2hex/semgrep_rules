metadata: &common_metadata
  category: security
  subcategory:
    - vuln
    - audit
  technology:
    - ruby
  vulnerability_class:
    - Local File Inclusion
    - Remote File Inclusion
    - Path Traversal
  cwe:
    - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
    - "CWE-23: Relative Path Traversal"
    - "CWE-98: Improper Control of Filename for Include/Require Statement in PHP Program ('Remote File Inclusion')"
    - "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
  owasp:
    - "A01:2021 - Broken Access Control"
    - "A05:2021 - Security Misconfiguration"
  confidence: HIGH
  impact: HIGH
  likelihood: HIGH
  shortDescription: Untrusted input flows into local or remote file loading sinks
  description: >
    This rule detects flows where user-controlled input reaches APIs that
    read local files, open paths, include code, render files, or fetch
    remote resources. If attackers can influence the path or URL, they may
    access arbitrary local files, traverse directories, include unintended
    code or templates, or retrieve remote content under attacker control.
  remediation: >
    Do not use untrusted input directly in file paths, include/load
    statements, or remote resource fetches. Restrict access to fixed
    directories, canonicalize and validate paths after resolution, enforce
    strict allowlists for expected files and hosts, and block traversal
    sequences and untrusted schemes. Prefer fixed resource mappings over
    dynamic path or URL construction.
  references:
    - "https://cwe.mitre.org/data/definitions/22.html"
    - "https://cwe.mitre.org/data/definitions/23.html"
    - "https://cwe.mitre.org/data/definitions/98.html"
    - "https://cwe.mitre.org/data/definitions/829.html"
    - "https://owasp.org/Top10/A01_2021-Broken_Access_Control/"
    - "https://owasp.org/Top10/A05_2021-Security_Misconfiguration/"

pattern-sources: &common_pattern_sources
  - pattern: params
  - pattern: cookies
  - pattern: session
  - pattern: request.headers
  - pattern: request.body
  - patterns:
      - pattern: def $FUNCTION(..., $SOURCE, ...) ... end
      - focus-metavariable: $SOURCE

paths: &common_paths
  exclude:
    - "*spec.rb"


rules:
  - id: ruby-taint-123-lfi-rfi-file-read
    languages:
      - ruby
    severity: HIGH
    message: >
      Untrusted input reaches a file access or remote resource loading sink.
      This can enable Local File Inclusion (LFI), Remote File Inclusion (RFI),
      arbitrary file read, path traversal, or unsafe remote resource loading.
      An attacker may read sensitive local files, load unintended application
      resources, or cause the application to fetch attacker-controlled content.
    mode: taint
    metadata: *common_metadata
    path: *common_paths
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: File.read(...)
      - pattern: ::File.read(...)
      - pattern: self.File.read(...)
      - pattern: send(:read, ...)
      - pattern: __send__(:read, ...)
      - pattern: public_send(:read, ...)
      - pattern: File.send(:read, ...)
      - pattern: File.__send__(:read, ...)
      - pattern: File.public_send(:read, ...)
      - pattern: method(:read).call(...)

