rules:
  - id: generic-pattern-313-git-ssl-verification-disabled
    message: >
      Git SSL certificate verification is being globally disabled.
      Disabling `http.sslVerify` allows Git to accept untrusted TLS certificates,
      which exposes users to Man-in-the-Middle (MITM) attacks and repository
      integrity compromise. Avoid disabling SSL verification globally. Instead,
      properly configure trusted certificate authorities.
    languages:
      - generic
    severity: HIGH
    metadata:
      category: security
      cwe:
        - "CWE-295: Improper Certificate Validation"
      owasp:
        - "A02:2021 – Cryptographic Failures"
      impact: >
        Attackers may intercept or tamper with Git traffic if TLS certificate
        validation is disabled.
      likelihood: Medium
      confidence: High
      references:
        - https://git-scm.com/docs/git-config#Documentation/git-config.txt-httpsslVerify
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
      vulnerability_class:
        - Security Misconfiguration
        - Improper Certificate Validation
    pattern-either:
      # Global disable (original + variants)
      - pattern: git config --global http.sslVerify false
      - pattern: git config --global http.sslVerify "false"
      - pattern: git config --global http.sslVerify 'false'
      - pattern: git config --global --bool http.sslVerify false
      - pattern: git config --global --bool http.sslVerify "false"
      - pattern: git config --global --bool http.sslVerify 'false'

      # System scope disable (also risky)
      - pattern: git config --system http.sslVerify false
      - pattern: git config --system http.sslVerify "false"
      - pattern: git config --system http.sslVerify 'false'
      - pattern: git config --system --bool http.sslVerify false
      - pattern: git config --system --bool http.sslVerify "false"
      - pattern: git config --system --bool http.sslVerify 'false'

      # Local repo disable (still risky; might be intentional, but worth flagging)
      - pattern: git config http.sslVerify false
      - pattern: git config http.sslVerify "false"
      - pattern: git config http.sslVerify 'false'
      - pattern: git config --bool http.sslVerify false
      - pattern: git config --bool http.sslVerify "false"
      - pattern: git config --bool http.sslVerify 'false'

      # One-shot config override via -c (common in scripts/CI)
      - pattern: git -c http.sslVerify=false $CMD
      - pattern: git -c http.sslVerify="false" $CMD
      - pattern: git -c http.sslVerify='false' $CMD
      - pattern: git -c http.sslverify=false $CMD

      # Environment variable disables verification for HTTPS in Git
      - pattern: GIT_SSL_NO_VERIFY=true git $CMD
      - pattern: GIT_SSL_NO_VERIFY=1 git $CMD
      - pattern: export GIT_SSL_NO_VERIFY=true
      - pattern: export GIT_SSL_NO_VERIFY=1
      - pattern: set GIT_SSL_NO_VERIFY=true
      - pattern: set GIT_SSL_NO_VERIFY=1

      # Host-specific sslVerify disable (http.<url>.sslVerify)
      - pattern: git config --global http.$HOST.sslVerify false
      - pattern: git config --global http.$HOST.sslVerify "false"
      - pattern: git config --global http.$HOST.sslVerify 'false'
      - pattern: git config http.$HOST.sslVerify false
      - pattern: git config http.$HOST.sslVerify "false"
      - pattern: git config http.$HOST.sslVerify 'false'