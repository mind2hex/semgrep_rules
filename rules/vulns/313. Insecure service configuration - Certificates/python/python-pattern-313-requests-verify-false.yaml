rules:
  - id: python-pattern-313-requests-verify-false
    languages:
      - python
    severity: LOW
    message: >
      TLS certificate verification is disabled in a Python HTTP request
      (`requests.$HTTPMETHOD(..., verify=False, ...)`). Disabling certificate
      verification allows connections to servers without validating their TLS
      certificate, which may expose the application to Man-in-the-Middle (MITM)
      attacks. Ensure certificate verification is enabled (`verify=True`) or
      provide a trusted CA bundle.
    patterns:
      - pattern: |
          requests.$HTTPMETHOD(..., verify=False, ...)
    metadata:
      category: security
      technology:
        - python
        - requests
        - http
        - tls
      cwe:
        - "CWE-295: Improper Certificate Validation"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      references:
        - https://docs.python-requests.org/en/latest/user/advanced/#ssl-cert-verification
        - https://cwe.mitre.org/data/definitions/295.html
      impact: >
        Disabling TLS certificate verification removes protection against
        spoofed servers and man-in-the-middle attacks.
      likelihood: MEDIUM
      confidence: HIGH
      remediation: >
        Remove `verify=False` and rely on the default TLS verification behavior.
        If a custom certificate authority is required, specify the CA bundle
        path using `verify="/path/to/ca-bundle.pem"`.
      tags:
        - security
        - tls
        - ssl
        - python
        - requests
        - misconfiguration