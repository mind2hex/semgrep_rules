metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - CWE-639 — Authorization Bypass Through User-Controlled Key
  confidence: LOW
  likelihood: LOW
  impact: HIGH
  owasp:
    - A2:2017 Broken Authentication

paths: &common_paths
  exclude:
    - "*test.js"
    - "*test.ts"
    - "*test.jsx"
    - "*test.tsx"
    - "*test.spec.js"
    - "*test.spec.ts"
    - "*test.spec.jsx"
    - "*test.spec.tsx"
    - "*test.unit.js"
    - "*test.unit.ts"
    - "*test.unit.jsx"
    - "*test.unit.tsx"
    - "*test.integration.js"
    - "*test.integration.ts"
    - "*test.integration.jsx"
    - "*test.integration.tsx"
    - "*test.e2e.js"
    - "*test.e2e.ts"
    - "*test.e2e.jsx"
    - "*test.e2e.tsx"
    - "**/*.component.ts"
    - "**/*.spec.ts"

    # Exclude files inside directories containing front/front-end/react (case variations)
    - "**/*front*/**"
    - "**/*Front*/**"
    - "**/*FRONT*/**"
    - "**/*front-end*/**"
    - "**/*Front-End*/**"
    - "**/*FRONT-END*/**"
    - "**/*react*/**"
    - "**/*React*/**"
    - "**/*REACT*/**"

rules:
  - id: javascript-pattern-006-req-url-includes
    languages:
      - javascript
      - typescript
    severity: HIGH

    message: >
      Potential authentication bypass via req.url.includes.
      req.url contains both path and query string, so partial matches or crafted
      parameters may allow authentication bypass.
    metadata: *common_metadata
    paths: *common_paths
    pattern-either:
      - pattern: $REQUEST.url?.includes($PATH)
      - pattern: $REQUEST.url.includes($PATH)
      
  - id: javascript-pattern-006-prototype-property-access
    languages:
      - javascript
      - typescript
    severity: HIGH
    message: >
      Potential authentication bypass via unsafe dynamic property access. Using
      user-controlled input to validate access with patterns like `$OBJ[$REQ]`,
      `$REQ in $OBJ`, or comparisons against `undefined/null` can allow
      prototype property access (e.g., `__proto__`, `constructor`) and lead to
      authentication or authorization bypass. Use `Object.hasOwn()`,
      `Object.prototype.hasOwnProperty.call()`, `Map.prototype.has()`, or
      objects created with `Object.create(null)` to safely validate keys.
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: function $FOO($REQ, $RES, next){...}
          - focus-metavariable: $REQ
    metadata: *common_metadata
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: | # if ($OBJ[$REQ])
                  if ($OBJ[$REQ]){
                    ...
                    return next();
                  }
              - pattern: | # if (!$OBJ[$REQ])
                  if (!$OBJ[$REQ]){
                    ...
                    return $RES.status(401).json(...)
                  }
              - pattern: | # if ($OBJ[$REQ] == undefined)
                  if ($OBJ[$REQ] == undefined){
                    ...
                    return $RES.status(401).json(...)
                  }
              - pattern: | # if ($OBJ[$REQ] !== undefined)
                  if ($OBJ[$REQ] !== undefined) next();
              - pattern: | # if ($OBJ[$REQ] != null)
                  if ($OBJ[$REQ] != null){
                    ...
                    return next();
                  }
              - pattern: | # if (!!$OBJ[$REQ])
                  if (!!$OBJ[$REQ]){
                    ...
                  } else {
                    ...
                    return $RES.sendStatus(401);
                  }
              - pattern: | # $OBJ[$REQ] ? ... : ...
                  return $OBJ[$REQ] ? next() : $RES.sendStatus(401);
              - pattern: | # if (typeof $OBJ[$REQ] !== "undefined")
                  if (typeof $OBJ[$REQ] !== "undefined") next();
              - pattern: | # if (!($REQ in $OBJ)) return $RES.sendStatus(401);
                  if (!($REQ in $OBJ)) return $RES.sendStatus(401);
          - focus-metavariable: $REQ

  - id: javascript-pattern-006-invalid-comparison-logic
    languages:
      - javascript
      - typescript
    severity: HIGH
    message: >
      Insecure authentication logic: credentials are validated with OR (||).
      This can allow authentication when only one condition matches (username OR password).
      Use AND (&&) and validate both credentials together.
    metadata: *common_metadata
    paths: *common_paths
    pattern-either:
      - patterns:
          - pattern:
              if ($USER === $USERNAME || $PASS === $PASSWORD){
                  ...
              }

          - metavariable-regex:
              metavariable: $USER
              regex: .*(user|username).*

          - metavariable-regex:
              metavariable: $PASS
              regex: .*(pass|password).*