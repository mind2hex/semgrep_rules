rules:
  - id: javascript-pattern-169-hardcoded-jwt-signing-secret-key
    languages:
      - javascript
      - typescript
    severity: MEDIUM
    message: >
      A hardcoded secret key was detected in a JWT signing operation.
      Embedding secrets directly in source code can lead to credential exposure
      and compromise the security of the application. Use secure secret management practices instead.
    metadata:
      category: security
      technology:
        - jwt
        - authentication
      vulnerability_class:
        - hardcoded-secret
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A2:2021 - Cryptographic Failures"
      references:
        - https://owasp.org/www-project-top-ten/
        - https://cwe.mitre.org/data/definitions/798.html
      remediation: >
        Avoid hardcoding secret keys in the source code. Store them in environment variables
        (e.g., process.env.JWT_SECRET) or use a secure secrets manager such as AWS Secrets Manager,
        HashiCorp Vault, or similar solutions.
    patterns:
      - pattern: jwt.sign($PAYLOAD, "$SECRET", ...)
      - focus-metavariable: $SECRET