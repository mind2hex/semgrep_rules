metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-532: Insertion of Sensitive Information into Log File"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: MEDIUM
  technology:
    - springframework

paths: &common_paths
  exclude:
    - "**/*.test.js"
    - "**/*.spec.js"
    - "**/*.unit.js"
    - "**/*Test.js"

rules:
  - id: javascript-pattern-059-sensitive-information-stored-in-logs
    languages:
      - javascript
      - typescript
    severity: ERROR
    message: |
      The application is storing sensitive information in logs.
    metadata: *common_metadata
    paths: *common_paths
    patterns:
      - pattern: $LOGGER.$METHOD(..., $SECRET, ...);
      - metavariable-regex:
          metavariable: $LOGGER
          regex: (?i)(log|logger|logging)
      - metavariable-regex:
          metavariable: $METHOD
          regex: (?i)(info|debug|warning|error)
      - metavariable-regex:
          metavariable: $SECRET
          regex: (?i)(jwt|jwttoken|token|secret|password|api|key|pass)
  
