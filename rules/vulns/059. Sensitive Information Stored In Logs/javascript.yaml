metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-532: Insertion of Sensitive Information into Log File"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: MEDIUM
  technology:
    - springframework

paths: &common_paths
  exclude:
    - "*test.js"
    - "*test.ts"
    - "*test.jsx"
    - "*test.tsx"
    - "*test.spec.js"
    - "*test.spec.ts"
    - "*test.spec.jsx"
    - "*test.spec.tsx"
    - "*test.unit.js"
    - "*test.unit.ts"
    - "*test.unit.jsx"
    - "*test.unit.tsx"
    - "*test.integration.js"
    - "*test.integration.ts"
    - "*test.integration.jsx"
    - "*test.integration.tsx"
    - "*test.e2e.js"
    - "*test.e2e.ts"
    - "*test.e2e.jsx"
    - "*test.e2e.tsx"
    - "**/*.component.ts"
    - "**/*.spec.ts"

    # Exclude files inside directories containing front/front-end/react (case variations)
    - "**/*front*/**"
    - "**/*Front*/**"
    - "**/*FRONT*/**"
    - "**/*front-end*/**"
    - "**/*Front-End*/**"
    - "**/*FRONT-END*/**"
    - "**/*react*/**"
    - "**/*React*/**"
    - "**/*REACT*/**"

rules:
  - id: javascript-pattern-059-sensitive-information-stored-in-logs
    languages:
      - javascript
      - typescript
    severity: ERROR
    message: |
      The application is storing sensitive information in logs.
    metadata: *common_metadata
    paths: *common_paths
    patterns:
      - pattern: $LOGGER.$METHOD(..., $SECRET, ...);
      - metavariable-regex:
          metavariable: $LOGGER
          regex: (?i)(log|logger|logging)
      - metavariable-regex:
          metavariable: $METHOD
          regex: (?i)(info|debug|warning|error)
      - metavariable-regex:
          metavariable: $SECRET
          regex: (?i)(jwt|jwttoken|token|secret|password|api|key|pass)
  
