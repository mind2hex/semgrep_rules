metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-77: Improper Neutralization of Special Elements used in a Command
      ('Command Injection')"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: HIGH
  owasp:
    - A3:2021 Injection
  technology:
    - expressjs
    - nodejs

pattern-sources: &common_pattern_sources
  - pattern: req.body
  - pattern: req.query
  - pattern: req.params
  - pattern: request.body
  - pattern: request.query
  - pattern: request.params
  - patterns: 
    - pattern: function $FUNC(..., $SINK, ...)
    - focus-metavariable: $SINK
  - patterns:
      - pattern: const $FUNC = function (..., $PARAM, ...) { ... }
      - focus-metavariable: $PARAM
  - patterns:
      - pattern: app.$HTTPMETHOD('...', (..., $SOURCE, ...) => {...})
      - focus-metavariable: $SOURCE
  - patterns:
      - pattern: module.exports = async function $FUNC(..., $SOURCE, ...){...};
      - focus-metavariable: $SOURCE

paths: &common_paths
  exclude:
    - "*test.js"
    - "*test.ts"
    - "*test.jsx"
    - "*test.tsx"
    - "*test.spec.js"
    - "*test.spec.ts"
    - "*test.spec.jsx"
    - "*test.spec.tsx"
    - "*test.unit.js"
    - "*test.unit.ts"
    - "*test.unit.jsx"
    - "*test.unit.tsx"
    - "*test.integration.js"
    - "*test.integration.ts"
    - "*test.integration.jsx"
    - "*test.integration.tsx"
    - "*test.e2e.js"
    - "*test.e2e.ts"
    - "*test.e2e.jsx"
    - "*test.e2e.tsx"
    - "**/*.component.ts"
    - "**/*.spec.ts"

    # Exclude files inside directories containing front/front-end/react (case variations)
    - "**/*front*/**"
    - "**/*Front*/**"
    - "**/*FRONT*/**"
    - "**/*front-end*/**"
    - "**/*Front-End*/**"
    - "**/*FRONT-END*/**"
    - "**/*react*/**"
    - "**/*React*/**"
    - "**/*REACT*/**"


rules:

  - id: javascript-taint-404-child-process-exec
    languages:
      - javascript
      - typescript
    severity: CRITICAL
    message: |
      The application allows the execution of functions or methods which execute commands in the system with non-sanitized parameters. This action would allow an attacker to inject malicious commands in the server to highly increase the attack vectors by escalating privileges, obtaining or modifying sensitive information stored in the machine.
    mode: taint
    metadata: *common_metadata
    path: *common_paths
    pattern-sources: *common_pattern_sources
    
    pattern-sinks:
      - pattern: require("child_process").exec(...)
      - pattern: require("child_process")["exec"](...)
      - pattern: require("child_process").exec.call(...)
      - pattern: require("child_process").exec.apply(...)
      - pattern: require("child_process").exec.bind(...)(...)
      - pattern: (0, require("child_process").exec)(...)
      - pattern: globalThis.require("child_process").exec(...)
      - pattern: window.require?.("child_process")?.exec?.(...)
      - pattern: (0, cp.exec)(...)
      - pattern: child_process.exec(...)
      - pattern: exec(...)
      - pattern: global.require("child_process").exec(...)
      - pattern: module.require("child_process").exec(...)
      - pattern: cp["exec"](...)
      - pattern: child_process["exec"](...)
      - pattern: Reflect.get(require("child_process"), "exec")(...)
      - pattern: Reflect.get(cp, "exec")(...)
      - pattern: Object.getOwnPropertyDescriptor(require("child_process"), "exec").value(...)
      - pattern: Object.getOwnPropertyDescriptor(cp, "exec").value(...)

