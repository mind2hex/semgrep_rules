metadata: &common_metadata
  category: security
  subcategory:
    - vuln
  cwe:
    - "CWE-78: Improper Neutralization of Special Elements used in an OS
      Command ('OS Command Injection')"
  confidence: MEDIUM
  likelihood: MEDIUM
  impact: HIGH
  owasp:
    - A3:2021 Injection

pattern-sources: &common_pattern_sources
  - pattern: params
  - pattern: cookies
  - pattern: session
  - pattern: request.headers
  - pattern: request.body
  - patterns:
      - pattern: def $FUNCTION(..., $SOURCE, ...) ... end
      - focus-metavariable: $SOURCE

paths: &common_paths
  exclude:
    - "*spec.rb"

rules:
  - id: ruby-taint-404-command-injection-backticks
    languages:
      - ruby
    severity: CRITICAL
    message: >
      The application allows the execution of functions or methods which execute
      commands in the system with non-sanitized parameters. This action would
      allow an attacker to inject malicious commands in the server to highly
      increase the attack vectors by escalating privileges, obtaining or
      modifying sensitive information stored in the machine.
    mode: taint
    path: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources

    pattern-sinks:
      - pattern: |
          `...`
      - pattern: |
          %x(...)

  - id: ruby-taint-404-command-injection-system-call
    languages:
      - ruby
    severity: CRITICAL
    message: >
      The application allows the execution of functions or methods which execute
      commands in the system with non-sanitized parameters. This action would
      allow an attacker to inject malicious commands in the server to highly
      increase the attack vectors by escalating privileges, obtaining or
      modifying sensitive information stored in the machine.
    mode: taint
    path: *common_paths
    metadata: *common_metadata
    pattern-sources: *common_pattern_sources
    pattern-sinks:
      - pattern: system(...)
      - pattern: Kernel.system(...)
      - pattern: ::Kernel.system(...)
      - pattern: self.system(...)
      - pattern: Kernel.system(...)
      - pattern: send(:system, ...)
      - pattern: __send__(:system, ...)
      - pattern: public_send(:system, ...)
      - pattern: Kernel.send(:system, ...)
      - pattern: Kernel.__send__(:system, ...)
      - pattern: Kernel.public_send(:system, ...)
      - pattern: method(:system).call(...)
      - pattern: Kernel.method(:system).call(...)
      - pattern: $OBJ.method(:system).call(...)
      - pattern: $OBJ.system(...)

