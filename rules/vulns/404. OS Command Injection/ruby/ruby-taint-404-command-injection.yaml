rules:
  - id: ruby-taint-404-command-injection
    languages:
      - ruby
    severity: CRITICAL
    paths:
      exclude:
        - "*spec.rb"
    message: >
      The application allows the execution of functions or methods which execute
      commands in the system with non-sanitized parameters. This action would
      allow an attacker to inject malicious commands in the server to highly
      increase the attack vectors by escalating privileges, obtaining or
      modifying sensitive information stored in the machine.
    mode: taint

    pattern-sources:
      - pattern: params
      - pattern: cookies
      - pattern: request.body
      - pattern: request.headers
      - patterns:
        - pattern: def $FUNCTION(..., $SOURCE, ...) ... end
        - focus-metavariable: $SOURCE

    pattern-sinks:
      - pattern: |
          `...`
      - pattern: |
          %x...

      - pattern: system(...)
      - pattern: exec(...)
      - pattern: spawn(...)

      - pattern: Kernel.exec(...)
      - pattern: Kernel.system(...)
      - pattern: Kernel.spawn(...)

      - pattern: Process.exec(...)
      - pattern: Process.spawn(...)
      
      - patterns:
        - pattern-either:
            - pattern: open("|#{$SINK}")
            - pattern: Kernel.open("|#{$SINK}")
            - pattern: IO.popen("|#{$SINK}")
        - focus-metavariable: $SINK

      - pattern: Open3.capture2(...)
      - pattern: Open3.capture2e(...)
      - pattern: Open3.capture3(...)
      - pattern: Open3.popen2(...)
      - pattern: Open3.popen2e(...)
      - pattern: Open3.popen3(...)
      - pattern: Open3.pipeline(...)
      - pattern: Open3.pipeline_w(...)
      - pattern: Open3.pipeline_r(...)
      - pattern: Open3.pipeline_rw(...)
      - pattern: Open3.pipeline_start(...)

      - pattern: PTY.spawn(...)
      - pattern: PTY.getpty(...)
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS
          Command ('OS Command Injection')"
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      owasp:
        - A3:2021 Injection
